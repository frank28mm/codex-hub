version: 1
defaults:
  allow_secret_materialization: false
credential_types:
  browser-session:
    description: Existing authenticated browser session controlled by the user.
    allowed_target_classes: [owned-low, owned-high, partner]
  api-token:
    description: Narrow-scope API token provided out of band.
    allowed_target_classes: [owned-low, partner]
  ssh-key:
    description: Dedicated SSH key for owned infrastructure.
    allowed_target_classes: [owned-high]
  local-file:
    description: Local file access within explicitly allowed directories.
    allowed_target_classes: [owned-low]
